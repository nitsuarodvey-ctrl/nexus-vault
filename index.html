<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Vault | Dev Library v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass-sidebar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border-right: 1px solid rgba(51, 65, 85, 0.3); }
        .preview-canvas { 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
            border-radius: 24px 24px 0 0;
        }
        .code-area { background-color: #0f172a; border-radius: 0 0 24px 24px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-400 h-screen flex overflow-hidden">

    <aside class="w-72 glass-sidebar flex flex-col z-20">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="size-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <span class="material-symbols-outlined text-white text-sm">hub</span>
                </div>
                <h1 class="text-white font-extrabold tracking-tight text-xl italic">NEXUS <span class="text-indigo-500 font-normal">VAULT</span></h1>
            </div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Component Library</p>
        </div>

        <nav id="sidebar-nav" class="flex-1 overflow-y-auto px-4 pb-8 space-y-6">
            </nav>

        <div class="p-6 border-t border-slate-800/50">
            <button onclick="toggleModal()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-xl text-xs font-bold transition-all shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">add_circle</span> YENİ BİLEŞEN EKLE
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#020617] p-6 gap-6">
        <div class="flex-[1.2] preview-canvas relative flex items-center justify-center shadow-inner border border-white/5 overflow-auto">
            <div class="absolute top-6 left-8 flex items-center gap-4">
                <div class="flex gap-1.5">
                    <div class="size-3 rounded-full bg-red-400/20 border border-red-400/40"></div>
                    <div class="size-3 rounded-full bg-yellow-400/20 border border-yellow-400/40"></div>
                    <div class="size-3 rounded-full bg-green-400/20 border border-green-400/40"></div>
                </div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Preview</span>
            </div>
            <div id="live-preview" class="w-full h-full flex items-center justify-center p-12"></div>
        </div>

        <div class="flex-1 code-area border border-slate-800 shadow-2xl flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-8 py-4 border-b border-slate-800/50">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-indigo-500 text-sm">javascript</span>
                    <span id="comp-name" class="text-[11px] font-bold text-slate-300 tracking-wider">component.jsx</span>
                </div>
                <button onclick="copyCode()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all border border-slate-700">
                    <span class="material-symbols-outlined text-sm">content_copy</span> KOPYALA
                </button>
            </div>
            <div class="flex-1 p-8 overflow-auto code-font text-sm leading-relaxed text-indigo-200/80 bg-slate-900/30">
                <pre><code id="code-output"></code></pre>
            </div>
        </div>
    </main>

    <div id="add-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-[#020617]/90 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="relative w-full max-w-2xl bg-[#0f172a] border border-slate-700 rounded-[32px] shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center">
                <h2 class="text-xl font-bold text-white">Yeni Bileşen Ekle</h2>
                <button onclick="toggleModal()" class="text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Proje Grubu</label>
                        <input id="new-proj" type="text" placeholder="Örn: GÜN 5 - NEXUS" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:border-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Bileşen Adı</label>
                        <input id="new-comp" type="text" placeholder="Örn: GlassCard" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:border-indigo-500 outline-none">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">HTML / JSX Kodu</label>
                    <textarea id="new-code" rows="8" placeholder="Kodları buraya yapıştır..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-indigo-300 font-mono focus:border-indigo-500 outline-none resize-none"></textarea>
                </div>
                <button onclick="saveNewComponent()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-600/20">KAYDET</button>
            </div>
        </div>
    </div>

    <script>
        // Zenboard'daki gibi LocalStorage entegrasyonu
        let library = JSON.parse(localStorage.getItem('nexusVault')) || {
            "GÜN 5 - NEXUS": {
                "GlassCard": `<div class="p-10 rounded-[32px] bg-white/10 backdrop-blur-2xl border border-white/20 shadow-xl text-center max-w-sm">\n  <h2 class="text-2xl font-bold text-slate-800">Nexus Design</h2>\n  <p class="text-slate-500 text-sm mt-2">Kişiselleştirilmiş bileşen yapısı.</p>\n</div>`,
                "ActionButton": `<button class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-500/30 hover:scale-105 transition-all">Sistemi Başlat</button>`
            }
        };

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';
            
            Object.keys(library).forEach(proj => {
                const group = document.createElement('div');
                group.innerHTML = `
                    <h3 class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">${proj}</h3>
                    <div class="space-y-1">
                        ${Object.keys(library[proj]).map(comp => `
                            <button onclick="viewComponent('${proj}', '${comp}')" class="w-full text-left px-4 py-2.5 text-sm rounded-xl hover:bg-slate-800/50 hover:text-indigo-400 transition-all flex items-center gap-3 group">
                                <div class="size-1.5 rounded-full bg-slate-700 group-hover:bg-indigo-500 transition-colors"></div>
                                ${comp}
                            </button>
                        `).join('')}
                    </div>
                `;
                nav.appendChild(group);
            });
        }

        function viewComponent(proj, comp) {
            const html = library[proj][comp];
            document.getElementById('live-preview').innerHTML = html;
            document.getElementById('code-output').innerText = html;
            document.getElementById('comp-name').innerText = `${comp}.jsx`;
        }

        function toggleModal() {
            document.getElementById('add-modal').classList.toggle('hidden');
        }

        function saveNewComponent() {
            const proj = document.getElementById('new-proj').value || "Genel";
            const comp = document.getElementById('new-comp').value;
            const code = document.getElementById('new-code').value;

            if(!comp || !code) return alert("Alanları doldur şefim!");

            if(!library[proj]) library[proj] = {};
            library[proj][comp] = code;

            localStorage.setItem('nexusVault', JSON.stringify(library));
            renderSidebar();
            toggleModal();
            viewComponent(proj, comp);
            
            // Temizlik
            document.getElementById('new-comp').value = '';
            document.getElementById('new-code').value = '';
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('code-output').innerText);
            alert("Kopyalandı!");
        }

        renderSidebar();
        // İlk açılışta ilk bileşeni göster
        const firstProj = Object.keys(library)[0];
        const firstComp = Object.keys(library[firstProj])[0];
        viewComponent(firstProj, firstComp);
    </script>
</body>
</html>
